name: Check and fix schedule slots

on:
  schedule:
    # Hourly fallback during broadcast hours (Cloudflare Worker handles */10)
    # Covers 9am-11pm Irish time year-round (IST=UTC+1 summer, GMT=UTC winter)
    - cron: '7 8-22 * * *'

  workflow_dispatch:
    inputs:
      target_datetime:
        description: 'Target datetime in Irish time (YYYY-MM-DD HH:MM:SS) - defaults to current Irish time'
        required: false
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: check-slot
  cancel-in-progress: false

jobs:
  check-slot:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }}
      RADIOCULT_USER: ${{ secrets.RADIOCULT_USER }}
      RADIOCULT_PW: ${{ secrets.RADIOCULT_PW }}

    steps:
      - name: Skip if a successful run occurred in the last hour
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RECENT=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "check-slot.yml" \
            --status success \
            --created ">$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)" \
            --json databaseId \
            --jq 'map(select(.databaseId != '"$GITHUB_RUN_ID"')) | length')
          if [ "$RECENT" -gt 0 ]; then
            echo "Skipping — $RECENT successful run(s) in the last hour."
            # Cancel this run so it shows as "cancelled" not "success".
            # Without this, skipped runs count as successes, causing every
            # subsequent run to also skip (infinite skip chain).
            gh run cancel "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY"
            sleep 60
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests python-dotenv playwright

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Calculate target datetime
        id: datetime
        run: |
          if [ -n "${{ inputs.target_datetime }}" ]; then
            TARGET_DATETIME="${{ inputs.target_datetime }}"
          else
            TARGET_DATETIME=$(TZ='Europe/Dublin' date +"%Y-%m-%d %H:%M:%S")
          fi
          echo "target_datetime=$TARGET_DATETIME" >> $GITHUB_OUTPUT
          echo "Target datetime (Irish time): $TARGET_DATETIME"

      - name: Check and fix slot
        run: |
          python scripts/add-eist-aris-shows.py "${{ steps.datetime.outputs.target_datetime }}" --check-slot --headless

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-slot-errors-${{ github.run_number }}
          path: error_screenshot_*.png
          retention-days: 7

      - name: Display summary
        if: always()
        run: |
          echo "## Check Slot Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target datetime (Irish time):** ${{ steps.datetime.outputs.target_datetime }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** LIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "**Status:** Completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Failed - check logs and error screenshots" >> $GITHUB_STEP_SUMMARY
          fi
